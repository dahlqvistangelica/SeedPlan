<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SeedPlan | Tillfälligt underhåll</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2f855a;
            --accent-soft: #e7f7ef;
            --ring: rgba(47, 133, 90, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #eefaf3 0%, var(--bg) 45%, #f5f6ff 100%);
            color: var(--text);
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(640px, 100%);
            background: var(--card);
            border-radius: 18px;
            padding: clamp(24px, 4vw, 40px);
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.08),
                0 0 0 1px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 0 var(--ring);
            animation: pulse 1.8s infinite;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.6rem, 4vw, 2.25rem);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.65;
            font-size: 1rem;
        }

        .meta {
            margin-top: 24px;
            display: grid;
            gap: 12px;
            text-align: left;
            background: #fafafa;
            border: 1px solid #ededed;
            border-radius: 12px;
            padding: 14px 16px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }

        .label {
            color: var(--muted);
        }

        .value {
            color: var(--text);
            font-weight: 600;
        }

        .footer {
            margin-top: 22px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 var(--ring);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(47, 133, 90, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(47, 133, 90, 0);
            }
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 14px;
                padding: 22px 18px;
            }

            .meta {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="maintenance-title">
        <div class="badge">
            <span class="dot" aria-hidden="true"></span>
            Planerat underhåll
        </div>

        <h1 id="maintenance-title">SeedPlan är tillfälligt nere</h1>
        <p>
            Vi uppdaterar just nu tjänsten för att förbättra stabilitet och prestanda.
            Tack för ditt tålamod — vi är snart tillbaka.
        </p>

        <section class="meta" aria-label="Underhållsinformation">
            <div class="row">
                <span class="label">Status</span>
                <span class="value">Pågående</span>
            </div>
            <div class="row">
                <span class="label">Påverkan</span>
                <span class="value">Webbappen är tillfälligt otillgänglig</span>
            </div>
            <div class="row">
                <span class="label">Uppdaterad</span>
                <span class="value" id="last-updated">Nu</span>
            </div>
        </section>

        <div class="footer">
            Vid frågor, kontakta teamet bakom SeedPlan.
        </div>
    </main>

    <script>
        const now = new Date();
        const formatter = new Intl.DateTimeFormat("sv-SE", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });

        const updatedEl = document.getElementById("last-updated");
        if (updatedEl) {
            updatedEl.textContent = formatter.format(now);
        }
    </script>
</body>
</html>
