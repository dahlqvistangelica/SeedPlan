<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="10;url=https://seedplan.app" />
    <title>SeedPlan | Vi har flyttat</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2f855a;
            --accent-soft: #e7f7ef;
            --ring: rgba(47, 133, 90, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #eefaf3 0%, var(--bg) 45%, #f5f6ff 100%);
            color: var(--text);
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(640px, 100%);
            background: var(--card);
            border-radius: 18px;
            padding: clamp(24px, 4vw, 40px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 0 var(--ring);
            animation: pulse 1.8s infinite;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.6rem, 4vw, 2.25rem);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.65;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            margin-top: 28px;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px var(--ring);
        }

            .btn:hover {
                background: #226645;
            }

            .btn:active {
                transform: scale(0.98);
            }

        .footer {
            margin-top: 32px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 var(--ring);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(47, 133, 90, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(47, 133, 90, 0);
            }
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 14px;
                padding: 32px 18px;
            }
        }
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="moved-title">
        <div class="badge">
            <span class="dot" aria-hidden="true"></span>
            Ny adress
        </div>

        <h1 id="moved-title">SeedPlan har flyttat!</h1>
        <p>
            Vi har uppdaterat tjänsten och finns numera på <strong>seedplan.app</strong>.<br>
            All din data och ditt konto finns kvar där. Vi är bara lite bättre nu än innan!
        </p>

        <a href="https://seedplan.app" class="btn">Gå till seedplan.app</a>

        <div class="footer">
            Du dirigeras om automatiskt om några sekunder...
        </div>
    </main>
</body>
</html>
